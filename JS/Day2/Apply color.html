<!DOCTYPE html>
<html>
    <head>
        <title>My Webpage</title>
    </head>
    <body>
        <h1 id="title">Hi</h1>
        <button onclick="changecolor()">Apply color</button>
        <script>
            function changecolor(){
                document.getElementById("title").style.color="black";
                document.getElementById("title").style.backgroundColor="yellow";
            }
        </script>
    </body>
</html>
